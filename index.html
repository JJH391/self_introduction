<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정지훈의 brat 페이지</title>
    <style>
        body {
            /* brat 이미지를 배경으로 설정 */
            background-image: url('./imgs/brat.png');
            background-color: #8ace00;
            /* 이미지 로딩 전 기본색 */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;

            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
        }

        .main-content {
            padding-top: 150px;
            /* 배경 위에서 글자가 잘 보이도록 상단 여백 조절 */
        }

        .intro-text {
            font-size: 35px;
            margin-bottom: 20px;
            line-height: 1.6;
            background-color: rgba(138, 206, 0, 0.7);
            /* 글자 가독성을 위해 살짝 배경색 추가 */
            display: inline-block;
            padding: 10px 20px;
        }

        .footer-link {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: black;
            text-decoration: none;
            opacity: 0.6;
            transition: 0.3s;
        }

        .footer-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* 반응형 컨테이너 보정 */
        @media (max-width: 768px) {

            .container,
            .main-content {
                width: 95% !important;
                padding: 20px !important;
                margin-top: 70px !important;
            }

            h1 {
                font-size: 30px !important;
            }

            /* 테이블 가로 스크롤 대응 */
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 500px;
                /* 테이블이 너무 찌그러지지 않게 최소 너비 유지 */
            }

            /* 버튼 배치 조정 */
            .btn-container {
                flex-direction: column;
                display: flex;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="main-content">
        <div class="intro-text">
            안녕하세요 저는 2학년 4반 10번 정지훈 입니다.<br>
            생일은 10월 6일 이며 취미는 운동과 게임입니다.
        </div>
    </div>
    <a href="https://youtu.be/39RxXGcf9-E?si=d7fiXr0VFdIB1W8P" target="_blank" class="footer-link">brat</a>
    <script src="JS/navbar.js"></script>
</body>

</html>
