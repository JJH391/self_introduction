<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정지훈의 brat 게시판</title>
    <style>
        body {
            background-color: #8ace00;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
        }

        .main-content {
            padding-top: 100px;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 50px;
        }

        .board-title {
            font-size: 40px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .input-group {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 20px;
            border: 3px solid black;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group input {
            padding: 12px;
            border: 2px solid black;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }

        .board-container {
            max-height: 500px;
            overflow-y: auto;
            border: 3px solid black;
            margin-bottom: 30px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .board-container::-webkit-scrollbar {
            width: 10px;
        }

        .board-container::-webkit-scrollbar-track {
            background: black;
        }

        .board-container::-webkit-scrollbar-thumb {
            background: #8ace00;
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table th,
        .board-table td {
            border: 2px solid black;
            padding: 15px;
            font-size: 18px;
            word-break: break-all;
        }

        .board-table th {
            background-color: black;
            color: white;
            position: sticky;
            top: 0;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .write-btn {
            background-color: black;
            color: white;
            padding: 12px 30px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .clear-btn {
            background-color: transparent;
            border: 2px solid black;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .admin-btn {
            border-color: red !important;
            color: red !important;
            display: none;
        }

        .footer-link {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: black;
            text-decoration: none;
            opacity: 0.6;
            z-index: 2000;
        }

        /* 반응형 컨테이너 보정 */
        @media (max-width: 768px) {

            .container,
            .main-content {
                width: 95% !important;
                padding: 20px !important;
                margin-top: 70px !important;
            }

            h1 {
                font-size: 30px !important;
            }

            /* 테이블 가로 스크롤 대응 */
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 500px;
                /* 테이블이 너무 찌그러지지 않게 최소 너비 유지 */
            }

            /* 버튼 배치 조정 */
            .btn-container {
                flex-direction: column;
                display: flex;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="main-content">
        <h1 class="board-title">Brat Board</h1>
        <div class="input-group">
            <input type="text" id="post-title" placeholder="무슨 생각 해? (최대 100자)" maxlength="100">
            <input type="text" id="post-author" placeholder="작성자">
            <button class="write-btn" onclick="addPost()">POST IT</button>
        </div>
        <div class="board-container">
            <table class="board-table">
                <thead>
                    <tr>
                        <th style="width: 10%;">번호</th>
                        <th>제목</th>
                        <th style="width: 20%;">작성자</th>
                        <th style="width: 20%;">날짜</th>
                    </tr>
                </thead>
                <tbody id="board-body"></tbody>
            </table>
        </div>
        <div class="btn-container">
            <button class="clear-btn" onclick="deleteLastPost()">DELETE LAST</button>
            <button class="clear-btn" onclick="clearBoard()">CLEAR ALL</button>
            <button id="admin-user-btn" class="clear-btn admin-btn" onclick="manageUsers()">USER MGMT</button>
        </div>
    </div>
    <a href="https://youtu.be/39RxXGcf9-E?si=d7fiXr0VFdIB1W8P" target="_blank" class="footer-link">brat</a>
    <script src="JS/navbar.js"></script>
    <script src="JS/board.js"></script>
    <script>
        if (localStorage.getItem('isAdmin') === 'true') {
            document.getElementById('admin-user-btn').style.display = 'block';
        }
        function manageUsers() {
            let users = JSON.parse(localStorage.getItem('bratUsers')) || {};
            let userList = Object.keys(users).join("\n");
            const target = prompt("삭제할 유저 ID를 적어줘 (관리자 제외):\n\n" + (userList || "유저 없음"));
            if (target && users[target]) {
                if (confirm(`${target} 계정을 삭제할 거야?`)) {
                    delete users[target];
                    localStorage.setItem('bratUsers', JSON.stringify(users));
                    alert("삭제 완료.");
                }
            } else if (target) alert("그런 유저는 없어.");
        }
    </script>
</body>

</html>
