<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정지훈의 brat 게시판</title>
    <style>
        body {
            background-color: #8ace00;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
        }

        .main-content {
            padding-top: 100px;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 50px;
        }

        .board-title {
            font-size: 40px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .input-group {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 20px;
            border: 3px solid black;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group input {
            padding: 12px;
            border: 2px solid black;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }

        /* --- 게시판 스크롤 박스 --- */
        .board-container {
            max-height: 500px;
            overflow-y: auto;
            border: 3px solid black;
            margin-bottom: 30px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .board-container::-webkit-scrollbar {
            width: 10px;
        }

        .board-container::-webkit-scrollbar-track {
            background: black;
        }

        .board-container::-webkit-scrollbar-thumb {
            background: #8ace00;
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table th,
        .board-table td {
            border: 2px solid black;
            padding: 15px;
            font-size: 18px;
            word-break: break-all;
        }

        .board-table th {
            background-color: black;
            color: white;
            position: sticky;
            top: 0;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .write-btn {
            background-color: black;
            color: white;
            padding: 12px 30px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .write-btn:hover {
            background-color: white;
            color: black;
        }

        .clear-btn {
            background-color: transparent;
            border: 2px solid black;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .footer-link {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: black;
            text-decoration: none;
            opacity: 0.6;
            z-index: 2000;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <h1 class="board-title">Brat Board</h1>
        <div class="input-group">
            <input type="text" id="post-title" placeholder="무슨 생각 해? (제목, 최대 100자)" maxlength="100">
            <input type="text" id="post-author" placeholder="너 누구야? (작성자)">
            <button class="write-btn" onclick="addPost()">POST IT</button>
        </div>
        <div class="board-container">
            <table class="board-table">
                <thead>
                    <tr>
                        <th style="width: 10%;">번호</th>
                        <th>제목</th>
                        <th style="width: 20%;">작성자</th>
                        <th style="width: 20%;">날짜</th>
                    </tr>
                </thead>
                <tbody id="board-body"></tbody>
            </table>
        </div>
        <div class="btn-container">
            <button class="clear-btn" onclick="deleteLastPost()">DELETE LAST</button>
            <button class="clear-btn" onclick="clearBoard()">CLEAR ALL</button>
        </div>
    </div>
    <a href="https://youtu.be/39RxXGcf9-E?si=d7fiXr0VFdIB1W8P" target="_blank" class="footer-link">brat</a>
    <script src="JS/navbar.js"></script>
    <script src="JS/board.js"></script>
</body>

</html>
